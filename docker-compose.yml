version: '3.8'
services:
  mongodb:
    image: mongo:latest
    container_name: qualite_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: qualite_backend
    ports:
      - "8080:8080"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/suivi_qualite
      - JWT_SECRET=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    container_name: qualite_frontend
    ports:
      - "4200:4200"
    depends_on:
      - backend

volumes:
  mongo_data:
