<div class="space-y-6 animate-in slide-in-from-right duration-500">
  <div class="flex justify-between items-center">
    <div>
      <h1 class="text-3xl font-bold text-slate-900">Gestion des Nomenclatures</h1>
      <p class="text-slate-500 mt-1">Définissez les types de projets, statuts et catégories</p>
    </div>
    <button mat-flat-button color="primary" class="rounded-xl px-6 py-2 shadow-lg shadow-primary-100">
      <mat-icon class="mr-2">settings_suggest</mat-icon> Ajouter Nomenclature
    </button>
  </div>

  <div class="glass overflow-hidden rounded-3xl border-slate-100 shadow-sm">
    <table mat-table [dataSource]="nomenclatures" class="w-full">
      <ng-container matColumnDef="nom">
        <th mat-header-cell *matHeaderCellDef class="text-slate-500 font-semibold py-6 px-4">Nom</th>
        <td mat-cell *matCellDef="let n" class="py-4 px-4 font-medium text-slate-900">{{ n.nomStructure }}</td>
      </ng-container>

      <ng-container matColumnDef="type">
        <th mat-header-cell *matHeaderCellDef class="text-slate-500 font-semibold py-6 px-4">Type</th>
        <td mat-cell *matCellDef="let n" class="py-4 px-4 text-slate-600">{{ n.typeStructure }}</td>
      </ng-container>

      <ng-container matColumnDef="desc">
        <th mat-header-cell *matHeaderCellDef class="text-slate-500 font-semibold py-6 px-4">Description</th>
        <td mat-cell *matCellDef="let n" class="py-4 px-4 text-slate-500 truncate max-w-xs">{{ n.description }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef class="text-slate-500 font-semibold py-6 px-4 text-right">Actions</th>
        <td mat-cell *matCellDef="let n" class="py-4 px-4 text-right">
          <button mat-icon-button class="text-slate-400 hover:text-slate-900 mr-2">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn">
            <mat-icon>delete_outline</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="hover:bg-slate-50/50 transition-colors"></tr>
    </table>
  </div>
</div>
