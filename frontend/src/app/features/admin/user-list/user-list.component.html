<div class="space-y-6 animate-in slide-in-from-left duration-500">
  <div class="flex justify-between items-center">
    <div>
      <h1 class="text-3xl font-bold text-slate-900">Utilisateurs & Accès</h1>
      <p class="text-slate-500 mt-1">Gérez les comptes utilisateurs et leurs permissions</p>
    </div>
    <button mat-flat-button color="primary" class="rounded-xl px-6 py-2 shadow-lg shadow-primary-100">
      <mat-icon class="mr-2">person_add</mat-icon> Nouvel Utilisateur
    </button>
  </div>

  <div class="glass overflow-hidden rounded-3xl border-slate-100 shadow-sm">
    <table mat-table [dataSource]="users" class="w-full">
      <ng-container matColumnDef="nom">
        <th mat-header-cell *matHeaderCellDef class="text-slate-500 font-semibold py-6 px-4">Utilisateur</th>
        <td mat-cell *matCellDef="let u" class="py-4 px-4 font-medium text-slate-900">{{ u.nom }}</td>
      </ng-container>

      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef class="text-slate-500 font-semibold py-6 px-4">Email</th>
        <td mat-cell *matCellDef="let u" class="py-4 px-4 text-slate-600">{{ u.email }}</td>
      </ng-container>

      <ng-container matColumnDef="role">
        <th mat-header-cell *matHeaderCellDef class="text-slate-500 font-semibold py-6 px-4">Rôle</th>
        <td mat-cell *matCellDef="let u" class="py-4 px-4">
          <span [ngClass]="getRoleClass(u.roles?.[0])" class="px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider">
            {{ u.roles?.[0] || 'Aucun' }}
          </span>
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef class="text-slate-500 font-semibold py-6 px-4 text-right">Actions</th>
        <td mat-cell *matCellDef="let u" class="py-4 px-4 text-right">
          <button mat-icon-button class="text-slate-400 hover:text-slate-900 mr-2">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn">
            <mat-icon>block</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="hover:bg-slate-50/50 transition-colors"></tr>
    </table>
  </div>
</div>
