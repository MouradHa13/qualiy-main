<div class="p-6">
  <div class="flex items-center justify-between mb-8">
    <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Ajouter un utilisateur</h1>
  </div>

  <div class="glass-card p-8 max-w-2xl mx-auto animate-fade-in">
    <form [formGroup]="userForm" (ngSubmit)="onSubmit()" class="space-y-6">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Nom</label>
          <input type="text" formControlName="nom" class="input-field" placeholder="Entrez le nom">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Prénom</label>
          <input type="text" formControlName="prenom" class="input-field" placeholder="Entrez le prénom">
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Email</label>
        <input type="email" formControlName="email" class="input-field" placeholder="exemple@mail.com">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Mot de passe</label>
        <div class="relative">
          <input [type]="showPassword ? 'text' : 'password'" formControlName="motDePasse" class="input-field pr-12" 
                 [class.border-red-500]="userForm.get('motDePasse')?.invalid && userForm.get('motDePasse')?.touched"
                 placeholder="8 caractères minimum dont 1 spécial">
          <button type="button" 
                  (click)="showPassword = !showPassword"
                  class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-primary transition-colors">
            <mat-icon>{{ showPassword ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
        </div>
        <div *ngIf="userForm.get('motDePasse')?.value" class="mt-3">
          <div class="flex justify-between items-center mb-1">
            <span class="text-[10px] font-bold uppercase tracking-wider text-gray-400">Force du mot de passe</span>
            <span class="text-[10px] font-bold uppercase" [ngClass]="getPasswordStrength().color.replace('bg-', 'text-')">
              {{ getPasswordStrength().label }}
            </span>
          </div>
          <div class="h-1.5 w-full bg-gray-100 dark:bg-gray-700 rounded-full overflow-hidden">
            <div class="h-full transition-all duration-500 ease-out" 
                 [ngClass]="getPasswordStrength().color"
                 [style.width.%]="getPasswordStrength().score"></div>
          </div>
        </div>

        <div *ngIf="userForm.get('motDePasse')?.touched && userForm.get('motDePasse')?.errors" class="mt-2 text-[11px] font-bold uppercase tracking-widest text-red-500">
          <span *ngIf="userForm.get('motDePasse')?.errors?.['required']">Le mot de passe est requis</span>
          <span *ngIf="userForm.get('motDePasse')?.errors?.['minlength']">Minimum 8 caractères</span>
          <span *ngIf="userForm.get('motDePasse')?.errors?.['pattern']">Un caractère spécial requis (!&#64;#$%^, etc.)</span>
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-3">Rôle & Permissions</label>
        <mat-select formControlName="roleId" class="modern-select" placeholder="Sélectionnez un rôle">
          <mat-option *ngFor="let role of roles" [value]="role.id" class="!h-auto !py-4">
            <div class="flex items-center gap-4">
              <div class="w-10 h-10 rounded-xl bg-gray-100 dark:bg-gray-700 flex items-center justify-center text-primary">
                <mat-icon>{{ getRoleIcon(role.nomRole) }}</mat-icon>
              </div>
              <div class="flex flex-col">
                <span class="font-black text-sm tracking-tight">{{ role.nomRole }}</span>
                <span class="text-[10px] text-gray-400 uppercase tracking-widest font-bold">{{ getRoleDescription(role.nomRole) }}</span>
              </div>
            </div>
          </mat-option>
        </mat-select>
        <div *ngIf="userForm.get('roleId')?.touched && userForm.get('roleId')?.errors?.['required']" class="mt-2 text-[11px] font-bold uppercase tracking-widest text-red-500">
          Veuillez sélectionner un rôle
        </div>
      </div>

      <div class="flex items-center space-x-3 p-4 bg-gray-50 dark:bg-gray-800/50 rounded-2xl border border-gray-100 dark:border-gray-700">
        <input type="checkbox" formControlName="actif" id="actif" class="rounded text-primary focus:ring-primary h-5 w-5">
        <label for="actif" class="text-sm font-bold text-gray-700 dark:text-gray-300 cursor-pointer">Activer le compte immédiatement</label>
      </div>

      <div class="pt-4 flex justify-end space-x-4">
        <button type="button" routerLink="/admin/users" class="px-6 py-2 border border-gray-300 dark:border-gray-600 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
          Annuler
        </button>
        <button  type="submit" [disabled]="userForm.invalid || isSubmitting" class="px-6 py-2 bg-gradient-to-r from-primary to-accent text-white rounded-lg shadow-md hover:shadow-lg transition-all disabled:opacity-50 flex items-center gap-2">
          <span *ngIf="isSubmitting" class="animate-spin h-4 w-4 border-2 border-white/30 border-t-white rounded-full"></span>
          {{ isSubmitting ? 'Création en cours...' : "Créer l'utilisateur" }}
        </button>
      </div>
    </form>
  </div>
</div>
