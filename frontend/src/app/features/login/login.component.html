<div class="min-h-screen bg-gray-50 flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 relative overflow-hidden login-bg">
  
  <!-- Abstract Animated Background Elements -->
  <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-primary rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob"></div>
  <div class="absolute top-[20%] right-[-10%] w-96 h-96 bg-accent rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob animation-delay-2000"></div>
  <div class="absolute bottom-[-20%] left-[20%] w-96 h-96 bg-blue-400 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob animation-delay-4000"></div>

  <!-- Main Login Card -->
  <div class="max-w-md w-full space-y-8 glass-card p-10 relative z-10 animate-slide-up">
    
    <div class="text-center">
      <div class="mx-auto h-16 w-16 bg-gradient-to-br from-primary to-accent rounded-2xl flex items-center justify-center shadow-lg transform rotate-3 hover:rotate-6 transition-transform duration-300 cursor-pointer">
        <span class="material-icons text-white text-3xl">verified</span>
      </div>
      <h2 class="mt-6 text-3xl font-extrabold text-gray-900 drop-shadow-sm">
        Qualité Suivi
      </h2>
      <p class="mt-2 text-sm text-gray-600">
        Connectez-vous pour accéder à votre espace
      </p>
    </div>

    <form class="mt-8 space-y-6" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="space-y-4 rounded-md shadow-sm">
        
        <!-- Email Input -->
        <div class="relative group">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <span class="material-icons text-gray-400 group-focus-within:text-primary transition-colors">email</span>
          </div>
          <input id="email-address" name="email" type="email" formControlName="email" autocomplete="email" required
            class="input-field pl-10 h-12" placeholder="Adresse e-mail">
          
          <div *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched" class="text-red-500 text-xs mt-1 ml-1">
            Un e-mail valide est requis.
          </div>
        </div>

        <!-- Password Input -->
        <div class="relative group">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <span class="material-icons text-gray-400 group-focus-within:text-primary transition-colors">lock</span>
          </div>
          <input [type]="isPasswordVisible ? 'text' : 'password'" id="password" name="password" formControlName="password" autocomplete="current-password" required
            class="input-field pl-10 pr-10 h-12" placeholder="Mot de passe">
          
          <div class="absolute inset-y-0 right-0 pr-3 flex items-center cursor-pointer">
            <span class="material-icons text-gray-400 hover:text-gray-600" (click)="togglePasswordVisibility()">
              {{ isPasswordVisible ? 'visibility_off' : 'visibility' }}
            </span>
          </div>
          
          <div *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" class="text-red-500 text-xs mt-1 ml-1">
            Mot de passe est requis.
          </div>
        </div>
      </div>

      <!-- Remember Me & Forgot Password -->
      <div class="flex items-center justify-between mt-4">
        <div class="flex items-center">
          <input id="remember-me" name="remember-me" type="checkbox" formControlName="rememberMe"
            class="h-4 w-4 text-primary focus:ring-primary border-gray-300 rounded cursor-pointer">
          <label for="remember-me" class="ml-2 block text-sm text-gray-700 cursor-pointer">
            Se souvenir de moi
          </label>
        </div>

        <div class="text-sm">
          <a href="#" class="font-medium text-primary hover:text-primary-dark transition-colors">
            Mot de passe oublié ?
          </a>
        </div>
      </div>

      <!-- Submit Button -->
      <div>
        <button type="submit" [disabled]="loginForm.invalid"
          class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-xl text-white bg-gradient-to-r from-primary to-accent hover:from-primary-dark hover:to-accent-dark focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary shadow-lg transform transition-all duration-300 disabled:opacity-50 disabled:cursor-not-allowed hover:-translate-y-1">
          <span class="absolute left-0 inset-y-0 flex items-center pl-3">
            <span class="material-icons text-white/50 group-hover:text-white/80 transition-colors">login</span>
          </span>
          Se connecter
        </button>
      </div>
    </form>
    
  </div>
</div>
