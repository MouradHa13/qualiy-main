<div class="login-container">
  <!-- Branding Side (Left) -->
  <div class="branding-side">
    <img src="assets/img/login-bg.png" alt="Quality Management" class="bg-image">
    <div class="branding-content">
      <div class="logo-large">
        <mat-icon>verified</mat-icon>
      </div>
      <h1>CNI <br> Quality Monitor</h1>
      <p>
        Pilotez vos standards d’excellence opérationnelle et surveillez la conformité de vos processus industriels en temps réel.
      </p>
    </div>
  </div>

  <!-- Form Side (Right) -->
  <div class="form-side">
    <div class="form-wrapper">
      <div class="form-header">
        <h2>Bienvenue</h2>
        <p>Connectez-vous pour accéder à votre espace de gestion.</p>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
        <!-- Email Input -->
        <div class="input-group">
          <label class="input-label">Adresse e-mail</label>
          <div class="input-container">
            <mat-icon class="input-icon">mail</mat-icon>
            <input 
              type="email" 
              formControlName="email" 
              placeholder="votre@email.com" 
              class="login-input"
              [class.error]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"
            >
          </div>
        </div>

        <!-- Password Input -->
        <div class="input-group">
          <label class="input-label">Mot de passe</label>
          <div class="input-container">
            <mat-icon class="input-icon">lock</mat-icon>
            <input 
              [type]="isPasswordVisible ? 'text' : 'password'" 
              formControlName="password" 
              placeholder="••••••••" 
              class="login-input"
              [class.error]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
            >
            <button 
              type="button" 
              class="visibility-toggle" 
              (click)="togglePasswordVisibility()"
            >
              <mat-icon>{{ isPasswordVisible ? 'visibility_off' : 'visibility' }}</mat-icon>
            </button>
          </div>
        </div>

        <!-- Extra Actions -->
        <div class="form-actions">
          <label class="remember-me">
            <input type="checkbox" formControlName="rememberMe">
            <span>Se souvenir de moi</span>
          </label>
          <a routerLink="/auth/forgot-password" class="forgot-password">Mot de passe oublié ?</a>
        </div>

        <!-- Submit Button -->
        <button 
          type="submit" 
          class="submit-btn" 
          [disabled]="loginForm.invalid"
        >
          <span>Se connecter</span>
          <mat-icon>arrow_forward</mat-icon>
        </button>
      </form>
    </div>
  </div>
</div>
